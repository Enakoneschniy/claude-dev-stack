name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Restrict GITHUB_TOKEN scope to minimum needed (T-33-02 mitigation).
# detect-changes needs pull-requests: read for paths-filter on PR events.
# Test jobs need contents: read only (checkout + run tests).
permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'tsconfig.json'
            root:
              - 'lib/**'
              - 'bin/**'
              - 'hooks/**'
              - 'tests/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vitest.config.ts'

  packages-job:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.packages == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run build  # runs tsc + post-build scripts (e.g., copy-migrations)
      - run: pnpm --filter "...[origin/main]" -r run test

  root-tests-job:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.root == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run build  # runs tsc + post-build scripts; root tests import @cds/core from dist/
      - run: pnpm -w vitest run --project root
